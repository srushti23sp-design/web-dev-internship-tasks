<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earbuds Landing Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#e0eafc,#cfdef3);
    padding:20px;
    overflow-x:hidden;
}

.container{
    max-width:1200px;
    margin:auto;
    background:#f7f7f7;
    border-radius:30px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.nav-left{
    display:flex;
    align-items:center;
    gap:35px;
}

.logo{
    width:45px;
    height:45px;
    background:#111;
    color:#fff;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:bold;
    transition:.4s;
}

.logo:hover{
    transform:rotate(360deg);
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    font-weight:500;
    position:relative;
    transition:.3s;
}

.nav-links a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0;
    height:2px;
    background:#7b3ff2;
    transition:.3s;
}

.nav-links a:hover{
    color:#7b3ff2;
}

.nav-links a:hover::after{
    width:100%;
}

.nav-right{
    display:flex;
    gap:10px;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

.login{
    background:#ececec;
}

.signup{
    background:linear-gradient(135deg,#7b3ff2,#a855f7);
    color:white;
}

/* Main Layout */

.grid{
    display:grid;
    grid-template-columns:1.3fr 1fr;
    gap:20px;
}

.card{
    border-radius:25px;
    overflow:hidden;
    position:relative;
    transition:.4s;
}

.card:hover{
    transform:translateY(-8px);
}

/* Hero Card */

.product-card{
    background:linear-gradient(135deg,#111,#222,#444);
    color:white;
    min-height:550px;
    padding:40px;
}

.product-card small{
    color:#bbb;
    letter-spacing:2px;
}

.product-card h1{
    font-size:65px;
    line-height:1.1;
    margin-top:20px;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

.product-img{
    position:absolute;
    right:30px;
    bottom:40px;
    width:320px;
    max-width:100%;
    animation:float 4s ease-in-out infinite;
}

.shop-btn{
    position:absolute;
    left:40px;
    bottom:40px;
    background:white;
    color:#111;
    padding:15px 25px;
    border-radius:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.shop-btn:hover{
    transform:scale(1.05);
}

/* Right Side */

.right{
    display:grid;
    grid-template-rows:1fr 1fr;
    gap:20px;
}

.blog{
    background:#ededed;
    padding:25px;
    min-height:260px;
}

.blog h3{
    font-size:14px;
    color:#666;
}

.blog h1{
    margin-top:100px;
    font-size:50px;
}

.blog::after{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(circle,#000,#777);
    right:-30px;
    bottom:-30px;
}

.bottom-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.about{
    background:linear-gradient(135deg,#8e2de2,#c471ed);
    color:white;
    min-height:220px;
    padding:25px;
}

.contact{
    background:linear-gradient(135deg,#c6ff00,#8bc34a);
    min-height:220px;
    padding:25px;
}

.about h2,
.contact h2{
    position:absolute;
    bottom:20px;
    left:20px;
    font-size:40px;
}

.arrow{
    position:absolute;
    top:20px;
    right:20px;
    font-size:25px;
}

/* Responsive */

@media(max-width:992px){

    .grid{
        grid-template-columns:1fr;
    }

    .product-card h1{
        font-size:50px;
    }
}

@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:20px;
    }

    .nav-left{
        flex-direction:column;
        gap:15px;
    }

    .nav-links{
        flex-wrap:wrap;
        justify-content:center;
    }

    .bottom-grid{
        grid-template-columns:1fr;
    }

    .product-card{
        min-height:auto;
        text-align:center;
    }

    .product-img{
        position:relative;
        width:220px;
        right:auto;
        bottom:auto;
        display:block;
        margin:25px auto;
    }

    .shop-btn{
        position:relative;
        left:auto;
        bottom:auto;
        display:inline-block;
        margin-top:15px;
    }

    .product-card h1{
        font-size:38px;
    }

    .blog h1{
        font-size:35px;
    }

    .about h2,
    .contact h2{
        font-size:30px;
    }
}

@media(max-width:480px){

    .product-card h1{
        font-size:30px;
    }

    .blog h1{
        font-size:28px;
    }

    .about h2,
    .contact h2{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="container">

    <nav class="navbar">

        <div class="nav-left">
            <div class="logo">◉</div>

            <div class="nav-links">
                <a href="#">Products</a>
                <a href="#">Features</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
        </div>

        <div class="nav-right">
            <button class="btn login">LOG IN</button>
            <button class="btn signup">SIGN UP</button>
        </div>

    </nav>

    <div class="grid">

        <div class="card product-card">

            <small>PREMIUM AUDIO EXPERIENCE</small>

            <h1>Wireless Earbuds<br>For Everyday<br>Life</h1>

            <img src="https://images.unsplash.com/photo-1590658268037-6bf12165a8df?auto=format&fit=crop&w=800&q=80"
            alt="Earbuds"
            class="product-img">

            <div class="shop-btn">Shop Now</div>

        </div>

        <div class="right">

            <div class="card blog">
                <span class="arrow">↗</span>
                <h3>LATEST AUDIO TECHNOLOGY</h3>
                <h1>Read Our Blog</h1>
            </div>

            <div class="bottom-grid">

                <div class="card about">
                    <span class="arrow">↗</span>
                    <h2>About Us</h2>
                </div>

                <div class="card contact">
                    <span class="arrow">✈</span>
                    <h2>Contact</h2>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
